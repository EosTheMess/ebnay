name: Flutter Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Export archive
        uses: maierj/setup-xcarchive@v1
        with:
          archive-path: build/ios/iphoneos/Runner.xcarchive

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

  deploy-testflight:
    needs: build-ios
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ./ipa

      - name: Deploy to TestFlight
        uses: apple-actions/upload-to-app-store-connect@v1
        with:
          app-path: ./ipa/*.ipa
          username: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          password: ${{ secrets.APP_STORE_CONNECT_PASSWORD }}
          distribute-to-external-testers: true

# Flutter Project Configuration for GitHub Actions
name: build-release
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Build IPA
        run: flutter build ios --release --no-codesign
      - name: Build Android AppBundle
        if: matrix.os == 'ubuntu-latest'
        run: flutter build bundle
      - name: Upload IPA
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/Runner.xcarchive
          retention-days: 7
      - name: Upload AppBundle
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: build\\app\\outputs\\bundle
          retention-days: 7

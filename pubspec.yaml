name: ebay_sheet_editor
description: Simple Google Sheets editor for non-tech users
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  googleapis: ^12.0.0
  googleapis_auth: ^1.4.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  intl: ^0.18.0
  flutter_slidable: ^3.0.0
  google_sign_in: ^6.1.5
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

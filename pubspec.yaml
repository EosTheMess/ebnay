name: ebay_sheet_editor
description: Simple Google Sheets editor for non-tech users
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  googleapis: ^13.1.0
  googleapis_auth: ^1.6.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  flutter_slidable: ^3.1.1
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
